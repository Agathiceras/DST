<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 2 Quiz — Roblox Game Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00F0FF; --magenta: #FF2D78; --green: #2ECC71; --red: #E74C3C; --gold: #FFD700;
    --dark-card: rgba(20,15,40,0.85); --border-glow: rgba(0,240,255,0.25);
    --text-primary: #FFFFFF; --text-secondary: #B8B8D0;
    --font-display: 'Fredoka', sans-serif; --font-body: 'Outfit', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font-body); color:var(--text-primary); background:transparent; min-height:100vh; display:flex; justify-content:center; padding:20px; }
  .quiz-container { max-width:720px; width:100%; }
  .quiz-header { text-align:center; margin-bottom:32px; }
  .quiz-header img { width:64px; height:64px; margin-bottom:12px; }
  .quiz-header h1 { font-family:var(--font-display); font-size:clamp(1.6rem,4vw,2.4rem); font-weight:700; letter-spacing:1px; text-transform:uppercase; }
  .quiz-header .brand { font-family:var(--font-body); font-size:0.85rem; color:var(--text-secondary); letter-spacing:2px; text-transform:uppercase; margin-top:4px; }
  .screen { display:none; } .screen.active { display:block; animation:fadeSlide 0.4s ease; }
  @keyframes fadeSlide { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .card { background:var(--dark-card); border:1px solid var(--border-glow); border-radius:16px; padding:32px; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); }
  .form-group { margin-bottom:20px; }
  .form-group label { display:block; font-weight:600; font-size:0.9rem; margin-bottom:8px; color:var(--text-secondary); }
  .form-group input, .form-group textarea { width:100%; padding:14px 16px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:10px; color:var(--text-primary); font-family:var(--font-body); font-size:1rem; transition:border-color 0.25s; }
  .form-group textarea { resize:vertical; min-height:80px; }
  .form-group input:focus, .form-group textarea:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,240,255,0.12); }
  .form-group input::placeholder, .form-group textarea::placeholder { color:rgba(255,255,255,0.3); }
  .form-error { color:var(--red); font-size:0.8rem; margin-top:6px; display:none; }
  .btn { display:inline-flex; align-items:center; justify-content:center; padding:14px 36px; border:none; border-radius:50px; font-family:var(--font-display); font-size:1rem; font-weight:600; cursor:pointer; transition:transform 0.2s,box-shadow 0.2s; text-transform:uppercase; letter-spacing:1px; }
  .btn:hover { transform:translateY(-2px); } .btn:active { transform:translateY(0); }
  .btn-primary { background:linear-gradient(135deg,var(--cyan),#00B8D4); color:#0a0a1a; box-shadow:0 4px 20px rgba(0,240,255,0.3); }
  .btn-green { background:linear-gradient(135deg,var(--green),#27AE60); color:#fff; box-shadow:0 4px 20px rgba(46,204,113,0.3); }
  .btn-danger { background:linear-gradient(135deg,var(--magenta),#C0392B); color:#fff; box-shadow:0 4px 20px rgba(255,45,120,0.3); }
  .progress-wrapper { margin-bottom:24px; }
  .progress-info { display:flex; justify-content:space-between; font-size:0.8rem; color:var(--text-secondary); margin-bottom:8px; }
  .progress-bar { height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--cyan),#00B8D4); border-radius:3px; transition:width 0.4s ease; }
  .badge { display:inline-block; padding:6px 20px; border-radius:50px; font-family:var(--font-display); font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:20px; }
  .badge-single { background:var(--cyan); color:#0a0a1a; } .badge-multi { background:#A66CFF; color:#fff; } .badge-tf { background:var(--magenta); color:#fff; }
  .question-text { font-family:var(--font-display); font-size:clamp(1rem,2.5vw,1.25rem); font-weight:600; line-height:1.5; text-align:center; margin-bottom:28px; }
  .options-grid { display:grid; gap:12px; } .options-grid.cols-2 { grid-template-columns:1fr 1fr; }
  @media (max-width:560px) { .options-grid.cols-2 { grid-template-columns:1fr; } }
  .option-btn { padding:16px 14px; background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.1); border-radius:12px; color:var(--text-primary); font-family:var(--font-body); font-size:0.9rem; font-weight:500; text-align:center; cursor:pointer; transition:all 0.2s; line-height:1.4; }
  .option-btn:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.25); }
  .option-btn.selected { background:rgba(0,240,255,0.1); border-color:var(--cyan); color:var(--cyan); }
  .option-btn.disabled { pointer-events:none; opacity:0.55; }
  .question-actions { text-align:center; margin-top:24px; }
  .lesson-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:2px; color:var(--text-secondary); text-align:center; margin-bottom:8px; }
  .result-icon { font-size:64px; text-align:center; margin-bottom:16px; }
  .result-score { font-family:var(--font-display); font-size:3rem; font-weight:700; text-align:center; margin-bottom:4px; }
  .result-score.pass { color:var(--green); } .result-score.fail { color:var(--red); }
  .result-label { text-align:center; font-size:1rem; color:var(--text-secondary); margin-bottom:8px; }
  .result-message { text-align:center; font-family:var(--font-display); font-size:1.15rem; font-weight:600; margin-bottom:28px; line-height:1.6; }
  .survey-section { margin-top:32px; }
  .survey-title { font-family:var(--font-display); font-size:1.1rem; font-weight:600; margin-bottom:20px; text-align:center; color:var(--cyan); }
  .survey-question { margin-bottom:20px; }
  .survey-question p { font-size:0.9rem; font-weight:500; margin-bottom:6px; }
  .survey-question .scale-labels { display:flex; justify-content:space-between; font-size:0.7rem; color:var(--text-secondary); margin-bottom:4px; max-width:220px; }
  .stars { display:flex; gap:6px; }
  .star { width:36px; height:36px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; transition:all 0.15s; }
  .star:hover, .star.active { background:rgba(255,215,0,0.15); border-color:var(--gold); } .star.active { color:var(--gold); }
  .survey-actions { text-align:center; margin-top:28px; }
  .thankyou-icon { font-size:72px; text-align:center; margin-bottom:16px; }
  .thankyou-text { text-align:center; font-family:var(--font-display); font-size:1.3rem; font-weight:600; line-height:1.6; }
</style>
</head>

let currentQ=0, score=0, userName='', userEmail='', answered=false, userAnswers=[];
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function startQuiz() {
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  let v=true;
  document.getElementById('err-name').style.display='none';
  document.getElementById('err-email').style.display='none';
  if(!name){ document.getElementById('err-name').style.display='block'; v=false; }
  if(!email||!email.endsWith('@kodland.team')){ document.getElementById('err-email').style.display='block'; v=false; }
  if(!v) return;
  userName=name; userEmail=email; currentQ=0; score=0; userAnswers=[];
  showScreen('screen-question'); renderQuestion();
}
function renderQuestion() {
  const q=QUESTIONS[currentQ]; answered=false;
  document.getElementById('q-counter').textContent=T.question_of.replace('{n}',currentQ+1).replace('{t}',QUESTIONS.length);
  document.getElementById('progress-fill').style.width=`${(currentQ/QUESTIONS.length)*100}%`;
  document.getElementById('q-lesson').textContent=q.lesson;
  document.getElementById('q-text').textContent=q.text;
  let bh='';
  if(q.type==='single') bh=`<span class="badge badge-single">${T.single_choice}</span>`;
  else if(q.type==='multi') bh=`<span class="badge badge-multi">${T.multi_select}</span>`;
  else bh=`<span class="badge badge-tf">${T.true_false}</span>`;
  document.getElementById('q-badge-wrap').innerHTML=bh;
  const grid=document.getElementById('q-options'); grid.innerHTML='';
  const opts=q.type==='tf'?[T.true,T.false]:q.options;
  grid.className='options-grid'+(q.type==='tf'?' cols-2':'');
  opts.forEach((opt,i)=>{
    const btn=document.createElement('div'); btn.className='option-btn'; btn.textContent=opt;
    if(q.type==='multi') btn.addEventListener('click',()=>toggleMulti(btn));
    else if(q.type==='single') btn.addEventListener('click',()=>selectSingle(i));
    else btn.addEventListener('click',()=>selectTF(i));
    grid.appendChild(btn);
  });
  const actions=document.getElementById('q-actions');
  if(q.type==='multi'){ actions.style.display='block'; const nb=document.getElementById('btn-next'); nb.textContent=T.submit; nb.onclick=submitMulti; }
  else { actions.style.display='none'; }
}
function lockAndScore(selIdx,isCorrect) {
  answered=true;
  const btns=document.querySelectorAll('#q-options .option-btn');
  btns.forEach(b=>b.classList.add('disabled'));
  btns[selIdx].classList.add('selected');
  if(isCorrect) score++;
  userAnswers.push(isCorrect?1:0);
  setTimeout(advance,600);
}
function advance() { if(currentQ<QUESTIONS.length-1){ currentQ++; renderQuestion(); } else showResults(); }
function selectSingle(i) { if(answered) return; lockAndScore(i,QUESTIONS[currentQ].correct.includes(i)); }
function selectTF(i) { if(answered) return; const ci=QUESTIONS[currentQ].correct===true?0:1; lockAndScore(i,i===ci); }
function toggleMulti(btn) { if(answered) return; btn.classList.toggle('selected'); }
function submitMulti() {
  if(answered) return; answered=true;
  const q=QUESTIONS[currentQ];
  const btns=document.querySelectorAll('#q-options .option-btn');
  const sel=[]; btns.forEach((b,i)=>{ if(b.classList.contains('selected')) sel.push(i); });
  btns.forEach(b=>b.classList.add('disabled'));
  const ok=q.correct.length===sel.length&&q.correct.every(c=>sel.includes(c));
  if(ok) score++;
  userAnswers.push(ok?1:0);
  const nb=document.getElementById('btn-next');
  nb.textContent=currentQ===QUESTIONS.length-1?T.finish:T.next;
  nb.onclick=advance;
}
function showResults() {
  document.getElementById('progress-fill').style.width='100%';
  showScreen('screen-results');
  const total=QUESTIONS.length, pct=Math.round((score/total)*100), passed=pct>=80;
  document.getElementById('results-card').innerHTML=`
    <div class="result-icon">${passed?'🎉':'📚'}</div>
    <div class="result-score ${passed?'pass':'fail'}">${score}/${total}</div>
    <div class="result-label">${pct}% ${T.correct}</div>
    <div class="result-message">${passed?T.congrats.replace('{name}',userName):T.fail_msg.replace('{name}',userName)}</div>
    ${passed?`
    <div class="survey-section">
      <div class="survey-title">${T.survey_title}</div>
      <div class="survey-question"><p>${T.s1_q}</p><div class="scale-labels"><span>${T.s1_low}</span><span>${T.s1_high}</span></div><div class="stars" data-survey="format">${[1,2,3,4,5].map(n=>`<div class="star" data-val="${n}" onclick="rateStar(this)">★</div>`).join('')}</div></div>
      <div class="survey-question"><p>${T.s2_q}</p><div class="scale-labels"><span>${T.s2_low}</span><span>${T.s2_high}</span></div><div class="stars" data-survey="usefulness">${[1,2,3,4,5].map(n=>`<div class="star" data-val="${n}" onclick="rateStar(this)">★</div>`).join('')}</div></div>
      <div class="survey-question"><p>${T.s3_q}</p><div class="scale-labels"><span>${T.s3_low}</span><span>${T.s3_high}</span></div><div class="stars" data-survey="liking">${[1,2,3,4,5].map(n=>`<div class="star" data-val="${n}" onclick="rateStar(this)">★</div>`).join('')}</div></div>
      <div class="survey-question"><p>${T.s4_q}</p><div class="form-group" style="margin-bottom:0"><textarea id="survey-comments" placeholder="${T.s4_placeholder}"></textarea></div></div>
      <div class="survey-actions"><button class="btn btn-green" onclick="submitSurvey()">${T.submit_responses}</button></div>
    </div>
    `:`<div class="question-actions"><button class="btn btn-danger" onclick="retakeQuiz()">${T.retake}</button></div>`}
  `;
}
function rateStar(el) { const c=el.parentElement,v=parseInt(el.dataset.val); c.querySelectorAll('.star').forEach(s=>{ s.classList.toggle('active',parseInt(s.dataset.val)<=v); }); }
function getStarVal(name) { const stars=document.querySelector(`[data-survey="${name}"]`); if(!stars) return 0; const active=stars.querySelectorAll('.star.active'); return active.length; }
function submitSurvey() {
  const data = {
    name: userName, email: userEmail, score: score, total: QUESTIONS.length, passed: score>=Math.ceil(QUESTIONS.length*0.8),
    answers: userAnswers,
    rFormat: getStarVal('format'), rUsefulness: getStarVal('usefulness'), rUpdate: getStarVal('liking'),
    comments: document.getElementById('survey-comments')?.value||''
  };
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzxJd5BqoqKbhTP9vEjWX7WJS04jSPIVxI41ldRUdAvGdT36dZFCwpmYpZz9jIm51P1/exec';
  if(SHEET_URL) {
    try { navigator.sendBeacon(SHEET_URL, new URLSearchParams({ payload: JSON.stringify(data) })); } catch(e) {}
  }
  showScreen('screen-thankyou');
}
function retakeQuiz() { currentQ=0; score=0; userAnswers=[]; showScreen('screen-question'); renderQuestion(); }
</script>
</body>
</html>
