<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Opening Scripts - Kodland Tutor Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Efecto de fondo animado tipo Arcane */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(157, 78, 221, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 0, 110, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(0deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 2px;
            z-index: 0;
            pointer-events: none;
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(10px);
            }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            color: white;
        }

        .logo {
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 15px;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.4);
            letter-spacing: 2px;
        }

        h1 {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 15px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 0, 110, 0.3), 0 0 30px rgba(157, 78, 221, 0.2);
            letter-spacing: 3px;
            font-family: 'Exo 2', sans-serif;
            background: linear-gradient(135deg, #00d9ff 0%, #9d4edd 50%, #ff006e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 10px rgba(157, 78, 221, 0.2));
        }

        .subtitle {
            font-size: 16px;
            color: #00d9ff;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(0, 217, 255, 0.3);
            letter-spacing: 1px;
        }

        .form-container {
            background: rgba(15, 20, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #00d9ff;
            padding: 50px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 10px rgba(0, 217, 255, 0.15),
                inset 0 0 10px rgba(0, 217, 255, 0.05);
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(157, 78, 221, 0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .form-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ff006e, transparent);
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        .question-group {
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .question-group:last-of-type {
            margin-bottom: 0;
        }

        .question-label {
            font-family: 'Exo 2', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #00d9ff;
            margin-bottom: 20px;
            display: block;
            text-shadow: 0 0 5px rgba(0, 217, 255, 0.2);
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .option {
            position: relative;
            display: flex;
            align-items: center;
        }

        .option input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .option-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 15px 20px;
            border: 2px solid #9d4edd;
            width: 100%;
            transition: all 0.3s ease;
            font-weight: 500;
            color: #e0e0e0;
            background: rgba(157, 78, 221, 0.05);
            position: relative;
        }

        .option-label::before {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid #00d9ff;
            border-radius: 3px;
            margin-right: 12px;
            transition: all 0.3s ease;
            flex-shrink: 0;
            background: rgba(0, 217, 255, 0.05);
            box-shadow: 0 0 8px rgba(0, 217, 255, 0.15);
        }

        .option input[type="radio"]:checked + .option-label {
            background: rgba(0, 217, 255, 0.12);
            border-color: #00d9ff;
            color: #00d9ff;
            box-shadow: 
                0 0 12px rgba(0, 217, 255, 0.2),
                inset 0 0 8px rgba(0, 217, 255, 0.08);
        }

        .option input[type="radio"]:checked + .option-label::before {
            background: #00d9ff;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.4), inset 0 0 3px rgba(0, 217, 255, 0.2);
            border-color: #00d9ff;
            content: '✓';
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0e27;
            font-weight: 700;
            font-size: 14px;
        }

        .option-label:hover {
            border-color: #ff006e;
            box-shadow: 0 0 10px rgba(255, 0, 110, 0.2);
            background: rgba(255, 0, 110, 0.05);
        }

        .submit-btn {
            background: linear-gradient(135deg, #00d9ff 0%, #9d4edd 100%);
            color: #0a0e27;
            border: 2px solid #ff006e;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            transition: all 0.3s ease;
            font-family: 'Exo 2', sans-serif;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3), 0 0 30px rgba(255, 0, 110, 0.1);
            position: relative;
            z-index: 2;
        }

        .submit-btn:hover {
            box-shadow: 
                0 0 20px rgba(0, 217, 255, 0.4),
                0 0 40px rgba(255, 0, 110, 0.2),
                inset 0 0 15px rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .result-container {
            background: rgba(15, 20, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #9d4edd;
            padding: 50px;
            display: none;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 10px rgba(157, 78, 221, 0.15),
                inset 0 0 10px rgba(157, 78, 221, 0.05);
        }

        .result-container.show {
            display: block;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #9d4edd, transparent);
            animation: borderGlow 3s ease-in-out infinite;
        }

        .result-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00d9ff 0%, #9d4edd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
            letter-spacing: 1px;
        }

        .result-subtitle {
            font-size: 14px;
            color: #00d9ff;
            margin-bottom: 30px;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 217, 255, 0.2);
        }

        .section {
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .section-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #00d9ff;
            padding-bottom: 12px;
            border-bottom: 2px solid #9d4edd;
            text-shadow: 0 0 5px rgba(0, 217, 255, 0.2);
            letter-spacing: 1px;
        }

        .script-step {
            background: rgba(157, 78, 221, 0.08);
            border-left: 3px solid #ff006e;
            border: 2px solid #9d4edd;
            border-left: 4px solid #ff006e;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 0 8px rgba(157, 78, 221, 0.1);
        }

        .script-step:hover {
            background: rgba(0, 217, 255, 0.08);
            border-color: #00d9ff;
            box-shadow: 
                0 0 15px rgba(0, 217, 255, 0.15),
                inset 0 0 8px rgba(0, 217, 255, 0.03);
            transform: translateX(5px);
        }

        .step-number {
            display: inline-block;
            background: linear-gradient(135deg, #ff006e 0%, #9d4edd 100%);
            color: white;
            padding: 4px 12px;
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 8px;
            box-shadow: 0 0 8px rgba(255, 0, 110, 0.25);
        }

        .step-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #00d9ff;
            margin-bottom: 8px;
            text-shadow: 0 0 5px rgba(0, 217, 255, 0.2);
        }

        .step-text {
            color: #b0b0b0;
            margin-bottom: 12px;
            line-height: 1.6;
            font-style: italic;
        }

        .tutor-action {
            background: rgba(0, 217, 255, 0.1);
            padding: 12px;
            color: #00d9ff;
            font-weight: 600;
            font-size: 14px;
            border-left: 3px solid #00d9ff;
            box-shadow: 0 0 8px rgba(0, 217, 255, 0.1);
        }

        .why-box {
            background: rgba(0, 217, 255, 0.08);
            border: 2px solid #00d9ff;
            padding: 20px;
            line-height: 1.8;
            color: #d0d0d0;
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.1), inset 0 0 8px rgba(0, 217, 255, 0.03);
        }

        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .tech-item {
            background: rgba(0, 217, 255, 0.08);
            padding: 20px;
            border: 2px solid #00d9ff;
            transition: all 0.3s ease;
            box-shadow: 0 0 8px rgba(0, 217, 255, 0.1);
            position: relative;
        }

        .tech-item:hover {
            background: rgba(157, 78, 221, 0.1);
            border-color: #9d4edd;
            box-shadow: 
                0 0 15px rgba(157, 78, 221, 0.2),
                inset 0 0 8px rgba(157, 78, 221, 0.05);
            transform: translateY(-4px);
        }

        .tech-label {
            font-family: 'Exo 2', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #ff006e;
            margin-bottom: 8px;
            text-shadow: 0 0 5px rgba(255, 0, 110, 0.2);
        }

        .tech-desc {
            font-size: 14px;
            color: #b0b0b0;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
            }

            .form-container,
            .result-container {
                padding: 30px 20px;
            }

            .options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">KODLAND</div>
            <h1>Class Opening Scripts</h1>
            <p class="subtitle">Personalized tutor scripts for every group dynamic</p>
        </header>

        <div class="form-container">
            <div class="question-group">
                <label class="question-label">1. What's your class size?</label>
                <div class="options">
                    <div class="option">
                        <input type="radio" id="p1" name="p" value="small">
                        <label for="p1" class="option-label">Small (1-3 students)</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="p2" name="p" value="medium">
                        <label for="p2" class="option-label">Medium (4-8 students)</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="p3" name="p" value="large">
                        <label for="p3" class="option-label">Large (9+ students)</label>
                    </div>
                </div>
            </div>

            <div class="question-group">
                <label class="question-label">2. How many lessons have you taught them?</label>
                <div class="options">
                    <div class="option">
                        <input type="radio" id="t1" name="t" value="first">
                        <label for="t1" class="option-label">First lesson (new group)</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="t2" name="t" value="short">
                        <label for="t2" class="option-label">Short series (2-4 lessons)</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="t3" name="t" value="ongoing">
                        <label for="t3" class="option-label">Ongoing group (5+ lessons)</label>
                    </div>
                </div>
            </div>

            <div class="question-group">
                <label class="question-label">3. What best describes your group's vibe?</label>
                <div class="options">
                    <div class="option">
                        <input type="radio" id="i1" name="i" value="shy">
                        <label for="i1" class="option-label">Shy & reserved</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="i2" name="i" value="chatty">
                        <label for="i2" class="option-label">Chatty & energetic</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="i3" name="i" value="gaming">
                        <label for="i3" class="option-label">Gaming & entertainment</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="i4" name="i" value="mixed">
                        <label for="i4" class="option-label">Mix of everything</label>
                    </div>
                </div>
            </div>

            <div class="question-group">
                <label class="question-label">4. Your comfort level with class openings?</label>
                <div class="options">
                    <div class="option">
                        <input type="radio" id="c1" name="c" value="new">
                        <label for="c1" class="option-label">New—give me exact words</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="c2" name="c" value="comf">
                        <label for="c2" class="option-label">Comfortable—give me guidance</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="c3" name="c" value="exp">
                        <label for="c3" class="option-label">Experienced—validate my approach</label>
                    </div>
                </div>
            </div>

            <button class="submit-btn" onclick="generateScript()">Generate My Opening Script</button>
        </div>

        <div class="result-container" id="result">
            <div class="result-title" id="result-title"></div>
            <div class="result-subtitle" id="result-subtitle"></div>

            <div class="section">
                <h2 class="section-title">Your Step-by-Step Script</h2>
                <div id="steps"></div>
            </div>

            <div class="section">
                <h2 class="section-title">Why This Works for Your Group</h2>
                <div class="why-box" id="why-box"></div>
            </div>

            <div class="section">
                <h2 class="section-title">Technical Setup</h2>
                <div class="tech-grid" id="tech-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const scripts = {
            'shy-short-code-new': {
                title: 'Welcoming Energy Check',
                time: '1-2 minutes',
                steps: [
                    {
                        num: '1',
                        title: 'Welcome & Camera Connection',
                        text: '"Hello my students, I\'m so happy to see you today. I\'ve missed you." [Look directly at camera, genuine smile] Put a heart reaction in chat so they see your warmth.',
                        action: '📍 You: React with heart (❤️) in Zoom reactions or Google Classroom'
                    },
                    {
                        num: '2',
                        title: 'Energy Check with Reactions',
                        text: '"Now I want to know how you\'re feeling. How\'s our energy today? I put a heart because I\'m very happy. What reaction will you put?" Wait 10-15 seconds.',
                        action: '📍 Students: React with emoji (😊 happy, 😴 tired, 🤔 confused, etc.)'
                    },
                    {
                        num: '3',
                        title: 'Name & Celebrate Reactions',
                        text: '"Matias, I see you put a happy face—nice! Sofia, a surprised face—does that mean you\'re excited about what we\'ll learn today?" [Pause, acknowledge each reaction individually]',
                        action: '📍 You: Mention 2-3 students by name and what their reaction shows'
                    }
                ],
                why: 'Shy students need to feel that: (1) You\'re genuinely happy to see them, (2) They can participate without unmuting (reactions are safe), (3) You notice them individually by name, (4) This is a judgment-free space where participating is celebrated.',
                tech: [
                    {label: 'Camera', desc: 'ON, looking at camera. Your presence matters.'},
                    {label: 'Reactions', desc: 'You put heart first (model it). Then they choose.'},
                    {label: 'Chat', desc: 'Optional backup for shy students.'},
                    {label: 'Microphone', desc: 'You speak warmly. No pressure to unmute.'}
                ]
            },
            'chatty-short-code-new': {
                title: 'High-Energy Opening & Quick Challenge',
                time: '1-2 minutes',
                steps: [
                    {
                        num: '1',
                        title: 'Explosive Welcome',
                        text: '"HEY! What\'s up? I\'m REALLY excited to see you. The energy here is contagious and I NEED it for what we\'re doing today. Are you ready?"',
                        action: '📍 You: Speak with HIGH energy, big gestures, genuine excitement'
                    },
                    {
                        num: '2',
                        title: 'Quick Energy Check',
                        text: '"Quick reaction: Who did something EPIC with code this week? TELL ME! Don\'t think—just say the first thing that comes to your head."',
                        action: '📍 Students: Unmuted OR chat. Go fast. No long pauses.'
                    },
                    {
                        num: '3',
                        title: 'Celebrate Loudly',
                        text: '"YES! [Student], that\'s what I\'m talking about. That kind of CREATIVE thinking is exactly what you need for today."',
                        action: '📍 You: Affirm with energy, use their idea to hype the class'
                    }
                ],
                why: 'Chatty students thrive on ENERGY and SPEED. Fast exchanges, celebrating ideas loudly, and competitive framing keeps them engaged from minute one.',
                tech: [
                    {label: 'Camera', desc: 'ON with BIG expressions. Energy is contagious.'},
                    {label: 'Microphone', desc: 'Unmuted. Let them shout answers. Overlapping is fine.'},
                    {label: 'Chat', desc: 'Backup for those who want to type.'},
                    {label: 'Reactions', desc: 'Quick polls: "Thumbs up if ready?"'}
                ]
            },
            'mixed-short-code-new': {
                title: 'Inclusive Energy + Flexible Response',
                time: '1-2 minutes',
                steps: [
                    {
                        num: '1',
                        title: 'Warm Welcome for Everyone',
                        text: '"Hello everyone. I\'m happy to see you today. Each one of you is here because you want to learn something new. That\'s what I love. So we\'re going to do this together, okay?"',
                        action: '📍 You: Camera on, smile, speak at medium pace'
                    },
                    {
                        num: '2',
                        title: 'Energy Check (All Methods)',
                        text: '"How are you feeling today? Some of you can react with an emoji. Others can write in the chat. Others can raise your hand. Any way is fine. I just want to know that we\'re here together and present."',
                        action: '📍 Students: Reactions AND chat AND hands. All options valid.'
                    },
                    {
                        num: '3',
                        title: 'Celebrate Mix',
                        text: '"I see happy faces, concentrated faces, some writing. PERFECT. That\'s what I want—people in different ways, all learning. Matias with his smile, Sofia writing, Lucas raising his hand. Everyone is needed."',
                        action: '📍 You: Name students with different participation styles'
                    }
                ],
                why: 'Mixed groups have shy AND chatty kids. Offer MULTIPLE ways to answer (reactions, chat, hand-raise). Celebrate each style.',
                tech: [
                    {label: 'Camera', desc: 'ON, warm energy'},
                    {label: 'Reactions', desc: 'Option 1 for shy students'},
                    {label: 'Chat', desc: 'Option 2 for others'},
                    {label: 'Hand-raise', desc: 'Option 3 for verbal students'}
                ]
            }
        };

        function generateScript() {
            const p = document.querySelector('input[name="p"]:checked')?.value;
            const t = document.querySelector('input[name="t"]:checked')?.value;
            const i = document.querySelector('input[name="i"]:checked')?.value;
            const c = document.querySelector('input[name="c"]:checked')?.value;

            if (!p || !t || !i || !c) {
                alert('Please answer all 4 questions');
                return;
            }

            const key = `${p}-${t}-${i}-${c}`;
            const script = scripts[key] || scripts['mixed-short-code-new'];

            document.getElementById('result-title').textContent = script.title;
            document.getElementById('result-subtitle').textContent = `Timing: ${script.time}`;

            let stepsHTML = '';
            script.steps.forEach(step => {
                stepsHTML += `
                    <div class="script-step">
                        <span class="step-number">Step ${step.num}</span>
                        <div class="step-title">${step.title}</div>
                        <div class="step-text">${step.text}</div>
                        <div class="tutor-action">${step.action}</div>
                    </div>
                `;
            });
            document.getElementById('steps').innerHTML = stepsHTML;

            document.getElementById('why-box').textContent = script.why;

            let techHTML = '';
            script.tech.forEach(tech => {
                techHTML += `
                    <div class="tech-item">
                        <div class="tech-label">${tech.label}</div>
                        <div class="tech-desc">${tech.desc}</div>
                    </div>
                `;
            });
            document.getElementById('tech-grid').innerHTML = techHTML;

            document.getElementById('result').classList.add('show');
            document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>
</html>
