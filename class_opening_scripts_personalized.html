<style>
body { font-family: var(--font-sans); }
.container { padding: 1rem 0; max-width: 100%; }
.q-group { margin: 0 0 1.5rem 0; }
.q-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 10px; }
.opts { display: flex; flex-direction: column; gap: 8px; }
.opt { display: flex; gap: 10px; align-items: flex-start; }
.opt input { margin: 4px 0 0 0; cursor: pointer; flex-shrink: 0; }
.opt label { cursor: pointer; font-size: 14px; margin: 0; }
.btn { width: 100%; padding: 12px; background: var(--color-background-info); color: var(--color-text-info); border: 0.5px solid var(--color-border-info); border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 1.5rem; }
.btn:hover { background: var(--color-background-secondary); }
.result { margin-top: 2rem; padding: 1.5rem; background: var(--color-background-secondary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); }
.r-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 8px 0; }
.r-sub { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 16px 0; }
.section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 1.25rem; margin-bottom: 16px; }
.sec-label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.script-step { margin-bottom: 16px; padding: 12px; background: var(--color-background-secondary); border-left: 3px solid var(--color-border-info); border-radius: 0; }
.step-num { font-size: 12px; font-weight: 500; color: var(--color-text-info); text-transform: uppercase; margin-bottom: 6px; }
.step-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
.step-text { font-size: 13px; color: var(--color-text-primary); line-height: 1.6; margin: 0; font-style: italic; }
.tutor-action { background: var(--color-background-tertiary); padding: 8px; border-radius: var(--border-radius-md); margin-top: 8px; font-size: 12px; color: var(--color-text-secondary); }
.subsec { margin-top: 16px; padding-top: 16px; border-top: 0.5px solid var(--color-border-tertiary); }
.subsec-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 10px; }
.tech-item { display: flex; gap: 10px; padding: 10px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); margin-bottom: 10px; }
.tech-icon { font-size: 16px; color: var(--color-text-info); min-width: 18px; }
.tech-label { font-size: 12px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
.tech-desc { font-size: 12px; color: var(--color-text-secondary); margin: 0; }
.why-box { background: var(--color-background-tertiary); border-left: 3px solid var(--color-border-success); border-radius: 0; padding: 12px; }
.why-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
.why-text { font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; margin: 0; }
</style>

<div class="container">
  <div class="q-group">
    <div class="q-title">1. What's your group's personality?</div>
    <div class="opts">
      <div class="opt"><input type="radio" id="p1" name="p" value="shy" /><label for="p1">Shy & quiet</label></div>
      <div class="opt"><input type="radio" id="p2" name="p" value="chatty" /><label for="p2">Chatty & energetic</label></div>
      <div class="opt"><input type="radio" id="p3" name="p" value="mixed" /><label for="p3">Mixed energy</label></div>
    </div>
  </div>

  <div class="q-group">
    <div class="q-title">2. How much time do you have?</div>
    <div class="opts">
      <div class="opt"><input type="radio" id="t1" name="t" value="short" /><label for="t1">1-2 minutes</label></div>
      <div class="opt"><input type="radio" id="t2" name="t" value="medium" /><label for="t2">3-5 minutes</label></div>
      <div class="opt"><input type="radio" id="t3" name="t" value="long" /><label for="t3">5+ minutes</label></div>
    </div>
  </div>

  <div class="q-group">
    <div class="q-title">3. What interests your students most?</div>
    <div class="opts">
      <div class="opt"><input type="radio" id="i1" name="i" value="code" /><label for="i1">Code & game development</label></div>
      <div class="opt"><input type="radio" id="i2" name="i" value="building" /><label for="i2">World design & architecture</label></div>
      <div class="opt"><input type="radio" id="i3" name="i" value="gaming" /><label for="i3">Gaming & entertainment</label></div>
      <div class="opt"><input type="radio" id="i4" name="i" value="mixed" /><label for="i4">Mix of everything</label></div>
    </div>
  </div>

  <div class="q-group">
    <div class="q-title">4. Your comfort level with class openings?</div>
    <div class="opts">
      <div class="opt"><input type="radio" id="c1" name="c" value="new" /><label for="c1">New—give me exact words</label></div>
      <div class="opt"><input type="radio" id="c2" name="c" value="comf" /><label for="c2">Comfortable—give me guidance</label></div>
      <div class="opt"><input type="radio" id="c3" name="c" value="exp" /><label for="c3">Experienced—validate my approach</label></div>
    </div>
  </div>

  <button class="btn" onclick="generate()">Generate My Opening Script</button>
  <div id="out"></div>
</div>

<script>
const scripts = {
  'shy-short-code-new': {
    title: 'Welcoming Energy Check',
    time: '1-2 minutes',
    steps: [
      {
        num: '1. Welcome & Camera Connection',
        title: 'Create warmth immediately',
        text: '"Hello my students, I\'m so happy to see you today. I\'ve missed you." [Look directly at camera, genuine smile] Put a heart reaction in chat so they see your warmth.',
        action: 'You: React with heart (❤️) in Zoom reactions or Google Classroom'
      },
      {
        num: '2. Energy Check with Reactions',
        title: 'Invite safe participation',
        text: '"Now I want to know how you\'re feeling. How\'s our energy today? I put a heart because I\'m very happy. What reaction will you put?" Wait 10-15 seconds.',
        action: 'Students: React with emoji (😊 happy, 😴 tired, 🤔 confused, etc.)'
      },
      {
        num: '3. Name & Celebrate Reactions',
        title: 'Make each student feel seen',
        text: '"Matias, I see you put a happy face—nice! Sofia, a surprised face—does that mean you\'re excited about what we\'ll learn today?" [Pause, acknowledge each reaction individually]',
        action: 'You: Mention 2-3 students by name and what their reaction shows'
      }
    ],
    why: 'Shy students need to feel that: (1) You\'re genuinely happy to see them, (2) They can participate without unmuting (reactions are safe), (3) You notice them individually by name, (4) This is a judgment-free space where participating is celebrated.'
  },

  'shy-medium-code-new': {
    title: 'Personal Welcome & Safe Sharing',
    time: '3-5 minutes',
    steps: [
      {
        num: '1. Warm Welcome',
        title: 'Build immediate trust',
        text: '"Hello everyone. I\'m so happy to see you. Not just because it\'s class, but because each one of you brings something special. Before we start, I want you to know that today we\'re learning together. I\'m not scared if someone doesn\'t know something. What matters is trying."',
        action: 'You: Camera on, look at camera, speak slowly and clearly'
      },
      {
        num: '2. Small Personal Question',
        title: 'Low-pressure sharing',
        text: '"Quick question: Did anyone do something with code or technology this week? Something small, something big, it doesn\'t matter. You can write in the chat or unmute if you want to talk. Whatever you prefer."',
        action: 'Students: Chat OR unmute to share briefly. You read chat highlights aloud.'
      },
      {
        num: '3. Celebrate & Connect',
        title: 'Affirm their thinking',
        text: '"I see that [Student] says [their answer]. That\'s really interesting because it shows you\'re thinking like a coder—observing how things work. Exactly that\'s what we\'ll do today."',
        action: 'You: Mention student by name, connect their answer to today\'s lesson'
      }
    ],
    why: 'Medium time + shy students = you create deeper connection. Specific praise by name + permission to struggle + multiple ways to answer (chat OR unmute) = safe environment where quiet kids feel brave enough to participate.'
  },

  'chatty-short-code-new': {
    title: 'High-Energy Opening & Quick Challenge',
    time: '1-2 minutes',
    steps: [
      {
        num: '1. Explosive Welcome',
        title: 'Match their energy immediately',
        text: '"HEY! What\'s up? I\'m REALLY excited to see you. The energy here is contagious and I NEED it for what we\'re doing today. Are you ready?"',
        action: 'You: Speak with HIGH energy, big gestures, genuine excitement'
      },
      {
        num: '2. Quick Energy Check',
        title: 'Fast-paced, no waiting',
        text: '"Quick reaction: Who did something EPIC with code this week? TELL ME! Don\'t think—just say the first thing that comes to your head."',
        action: 'Students: Unmuted OR chat. Go fast. No long pauses.'
      },
      {
        num: '3. Celebrate Loudly',
        title: 'Build momentum',
        text: '"YES! [Student], that\'s what I\'m talking about. That kind of CREATIVE thinking is exactly what you need for today."',
        action: 'You: Affirm with energy, use their idea to hype the class'
      }
    ],
    why: 'Chatty students thrive on ENERGY and SPEED. Long explanations kill their momentum. Fast exchanges, celebrating ideas loudly, and the promise of a cool challenge keeps them engaged and excited from minute one.'
  },

  'chatty-long-code-new': {
    title: 'Story + Dialogue Opening',
    time: '5+ minutes',
    steps: [
      {
        num: '1. Explosive Energy',
        title: 'Capture immediate attention',
        text: '"HELLO! TODAY IS A SPECIAL DAY! I have a question you probably weren\'t expecting... Do you know that the most successful programmers started exactly like you? With zero knowledge about redstone, no idea how circuits work. And you know what? They said YES to the challenge. What do you say?"',
        action: 'You: Tell a SHORT story (30 sec max) about a coder learning redstone'
      },
      {
        num: '2. Open Dialogue',
        title: 'Get them talking fast',
        text: '"Has anyone here felt intimidated by learning something new? [Wait for responses] Exactly. Everyone. Me too. But here\'s the secret: that fear is adrenaline. It\'s your brain GROWING. And that\'s what we\'re going to do today."',
        action: 'Students: Unmuted responses, dialogue, real conversation'
      },
      {
        num: '3. Peer Hyping',
        title: 'Build group momentum',
        text: '"Does someone here believe they can leave class today understanding redstone BETTER than when they came in? [Show hands/reactions] THAT\'S what I want to hear! Because we\'re ALL going to understand it together."',
        action: 'You: Celebrate volunteers, call them out by name, build them up'
      }
    ],
    why: 'Long time + chatty = tell stories, have real conversations, build narrative. Chatty students care about MEANING (why does this matter?) + CHALLENGE (can I do this?) + COMMUNITY (we\'re in this together). This opening hits all three.'
  },

  'mixed-short-code-new': {
    title: 'Inclusive Energy + Flexible Response',
    time: '1-2 minutes',
    steps: [
      {
        num: '1. Warm Welcome for Everyone',
        title: 'Set inclusive tone',
        text: '"Hello everyone. I\'m happy to see you today. Each one of you is here because you want to learn something new. That\'s what I love. So we\'re going to do this together, okay?"',
        action: 'You: Camera on, smile, speak at medium pace'
      },
      {
        num: '2. Energy Check (All Methods)',
        title: 'Multiple ways to participate',
        text: '"How are you feeling today? Some of you can react with an emoji. Others can write in the chat. Others can raise your hand. Any way is fine. I just want to know that we\'re here together and present."',
        action: 'Students: Reactions AND chat AND hands. All options valid.'
      },
      {
        num: '3. Celebrate Mix',
        title: 'Affirm different styles',
        text: '"I see happy faces, concentrated faces, some writing. PERFECT. That\'s what I want—people in different ways, all learning. Matias with his smile, Sofia writing, Lucas raising his hand. Everyone is needed."',
        action: 'You: Name students with different participation styles'
      }
    ],
    why: 'Mixed groups have shy AND chatty kids. Solution: offer MULTIPLE ways to answer (reactions, chat, hand-raise). Celebrate each style. This honors introverts (reactions/chat) AND extroverts (voice). No one feels forced into the "wrong" mode.'
  },

  'mixed-long-code-new': {
    title: 'Collaborative Opening Ritual',
    time: '5+ minutes',
    steps: [
      {
        num: '1. Personal Welcome',
        title: 'Create ritual',
        text: '"Welcome to class. Before we start, I want you to know that every person on this call brings something special. And that matters. So: camera on, reactions ready, chat open. Let\'s begin TOGETHER."',
        action: 'You: Slow, intentional, set a ceremony-like tone'
      },
      {
        num: '2. Pair Share (or group)',
        title: 'Build connection',
        text: '"Next question: Think about a time you learned something and felt PROUD of it. Could be code, could be anything. If you want, tell someone here. It\'s not mandatory, but I love hearing your stories."',
        action: 'Students: Optional peer chat, OR unmute to share with group'
      },
      {
        num: '3. Celebration Circle',
        title: 'Honor the group',
        text: '"Who wants to share a quick story?" [Let 2-3 people share] "See that? Each story is different. Every person learned differently. That\'s INCREDIBLE. That\'s what I want in class—different ways of learning, all valid."',
        action: 'You: Create space for sharing, celebrate differences'
      }
    ],
    why: 'Long time + mixed group = BUILD COMMUNITY. Pair sharing + celebration + honoring differences = all students feel seen. Shy kids can share 1-on-1, chatty kids unmute to group, all learning styles are validated.'
  },

  'building-short-shy-new': {
    title: 'Welcome + Visual Energy Check',
    time: '1-2 minutes',
    steps: [
      {
        num: '1. Welcome & Presence',
        title: 'Build connection through camera',
        text: '"Hello everyone. I\'m so glad to see you. I was looking forward to this class." [Smile at camera, genuine eye contact through screen]',
        action: 'You: Camera on, warm smile, look directly at lens'
      },
      {
        num: '2. Visual Energy Check',
        title: 'Safe, non-verbal participation',
        text: '"How are you feeling today? If you\'re excited about what we\'re building, put a building emoji or thumbs up. If you\'re curious, use a thinking face. If you\'re just here, that\'s perfect too—any reaction."',
        action: 'Students: React with visual emojis. No speaking required.'
      },
      {
        num: '3. Celebrate & Notice',
        title: 'Make them feel seen',
        text: '"I see excitement out there. I see curiosity. Beautiful. That\'s the energy we need to create something amazing today."',
        action: 'You: Acknowledge reactions warmly, group-wide (not necessarily individual names)'
      }
    ],
    why: 'Shy + builders + short time = focus on VISUAL creation from the start. They\'re excited about building, not talking. Reactions are visual (matches their interest). Keep warm but brief. Let them start creating quickly.'
  },

  'gaming-short-chatty-new': {
    title: 'Adventure Hook Opening',
    time: '1-2 minutes',
    steps: [
      {
        num: '1. Epic Hook',
        title: 'Grab attention immediately',
        text: '"GUESS WHAT?! Today you\'re not just learning something—you\'re unlocking a SUPERPOWER. In Minecraft, it\'s called redstone. In the real world, it\'s called logic. Coders use it. Gamers love it. Are you ready?"',
        action: 'You: High energy, speak like you\'re announcing something epic'
      },
      {
        num: '2. Quick Energy Pulse',
        title: 'Fast engagement',
        text: '"Who here feels like they\'ve been waiting for this? Give me a reaction—thumbs up, fire, celebration, whatever shows me you\'re IN."',
        action: 'Students: Unmuted reactions, emojis, quick feedback'
      },
      {
        num: '3. Challenge Frame',
        title: 'Create momentum',
        text: '"Perfect. Because by the end of today, you\'re going to DO something that looks impossible. But it\'s not. Let\'s go."',
        action: 'You: Build excitement, move FORWARD immediately'
      }
    ],
    why: 'Gaming + chatty + short = HOOK THEM WITH ADVENTURE. They love games, they love challenges, they love that "level up" feeling. Use gaming language (superpower, unlock, impossible challenge). Keep it brief but INTENSE.'
  }
};

function generate() {
  const p = document.querySelector('input[name="p"]:checked')?.value;
  const t = document.querySelector('input[name="t"]:checked')?.value;
  const i = document.querySelector('input[name="i"]:checked')?.value;
  const c = document.querySelector('input[name="c"]:checked')?.value;
  
  if (!p || !t || !i || !c) { alert('Answer all 4 questions'); return; }
  
  const key = `${p}-${t}-${i}-${c}`;
  const script = scripts[key] || scripts['mixed-short-code-new'];
  
  let h = `<div class="result">
    <div class="r-title">${script.title}</div>
    <div class="r-sub">Timing: ${script.time}</div>
    
    <div class="section">
      <div class="sec-label">Your Step-by-Step Script</div>
      ${script.steps.map(s => `
        <div class="script-step">
          <div class="step-num">${s.num}</div>
          <div class="step-title">${s.title}</div>
          <div class="step-text">${s.text}</div>
          <div class="tutor-action">📍 <strong>Your action:</strong> ${s.action}</div>
        </div>
      `).join('')}
    </div>
    
    <div class="section">
      <div class="subsec-title">Why This Works for Your Group</div>
      <div class="why-box">
        <div class="why-text">${script.why}</div>
      </div>
    </div>
    
    <div class="section">
      <div class="subsec-title">Technical Setup</div>
      <div class="tech-item">
        <div class="tech-icon"><i class="ti ti-video"></i></div>
        <div>
          <div class="tech-label">Camera</div>
          <div class="tech-desc">ON throughout. Your warmth and presence matter.</div>
        </div>
      </div>
      <div class="tech-item">
        <div class="tech-icon"><i class="ti ti-microphone"></i></div>
        <div>
          <div class="tech-label">Microphone</div>
          <div class="tech-desc">You speak warmly. Students unmute only if comfortable.</div>
        </div>
      </div>
      <div class="tech-item">
        <div class="tech-icon"><i class="ti ti-message-circle"></i></div>
        <div>
          <div class="tech-label">Chat</div>
          <div class="tech-desc">Always available as backup for shy students.</div>
        </div>
      </div>
      <div class="tech-item">
        <div class="tech-icon"><i class="ti ti-hand-click"></i></div>
        <div>
          <div class="tech-label">Reactions</div>
          <div class="tech-desc">Primary for low-pressure participation.</div>
        </div>
      </div>
    </div>
  </div>`;
  
  document.getElementById('out').innerHTML = h;
}
</script>
